# SSTPA Tools Backend — Docker Compose topology (SRS §5.7.4)
# Two zones: `edge` (public-facing) and `backend` (private). Only Caddy is
# internet-facing (SRS §5.1, §5.2). Grafana is published through Caddy (§5.3).
#
# 2025 Nicholas Triska. All rights reserved. See NOTICE at repository root.

name: sstpa-backend

services:
  caddy:
    image: caddy:2.11.4
    restart: unless-stopped
    ports:
      - "${SSTPA_HTTP_PORT:-80}:80"
      - "${SSTPA_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge
      - backend
    depends_on:
      - backend
      - grafana

  backend:
    image: sstpa-backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SSTPA_NEO4J_URI: bolt://neo4j:7687
      SSTPA_NEO4J_USER: neo4j
      SSTPA_NEO4J_PASSWORD: ${SSTPA_NEO4J_PASSWORD:?SSTPA_NEO4J_PASSWORD must be set in deploy/.env}
      SSTPA_HTTP_ADDR: :8080
      SSTPA_OTLP_ENDPOINT: otel-collector:4317
      SSTPA_ENV: ${SSTPA_ENV:-development}
    networks:
      - backend
    depends_on:
      neo4j:
        condition: service_healthy
      otel-collector:
        condition: service_started

  neo4j:
    image: neo4j:2026.05.0-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${SSTPA_NEO4J_PASSWORD:?SSTPA_NEO4J_PASSWORD must be set in deploy/.env}
      # Exposed to the healthcheck's cypher-shell probe (not read by Neo4j).
      SSTPA_NEO4J_PASSWORD: ${SSTPA_NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_db_transaction_timeout: 120s
    volumes:
      - neo4j-data:/data
      - ./neo4j/import:/var/lib/neo4j/import
    networks:
      - backend
    healthcheck:
      # Bolt-level readiness (what the backend actually connects to), not just
      # the HTTP port being up, so the backend never starts against a DB that
      # is not yet accepting queries.
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$$SSTPA_NEO4J_PASSWORD\" 'RETURN 1;' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.155.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - backend
    depends_on:
      - tempo

  prometheus:
    image: prom/prometheus:v3.13.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - backend

  tempo:
    image: grafana/tempo:2.9.3
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - backend

  grafana:
    image: grafana/grafana:13.0.3
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: "https://localhost/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: ${SSTPA_GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${SSTPA_GRAFANA_PASSWORD:?SSTPA_GRAFANA_PASSWORD must be set in deploy/.env}
      # Anonymous access disabled for production (SRS §5.7.3 security model);
      # dashboards require the Grafana admin login through Caddy /grafana/.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - backend

networks:
  edge:
  backend:

volumes:
  neo4j-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  tempo-data:
  grafana-data:
